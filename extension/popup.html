<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PlayCanvas Agent Bridge</title>

      body {
        color: #1f2937;
        font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        padding: 14px;

        word-break: break-all;
      }

      <dt>Daemon</dt>
